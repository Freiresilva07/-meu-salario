<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Salário PRO - Corrigido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0f1e; --card: #161f33; --accent: #00d2ff; }
        body { background: var(--bg); color: white; font-family: system-ui, sans-serif; padding: 10px; padding-bottom: 50px; }
        .card-mobile { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid #2d3748; }
        .input-mobile { background: #0a0f1e !important; color: white !important; border: 1px solid #3d4a66; padding: 15px; border-radius: 12px; font-size: 16px; }
        .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-box { padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; }
        .btn-add { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; }
        .btn-reset { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 20px; }
        
        .perc-impacto { color: var(--accent); font-size: 0.85rem; font-weight: 600; display: block; margin-top: 2px; }
        
        .table-custom { font-size: 0.95rem; color: white !important; }
        .table-custom td { border-bottom: 1px solid #2d3748; padding: 15px 5px; background: transparent !important; color: white !important; }
        
        .btn-del-item { background: none; border: none; color: #ef4444; font-size: 1.2rem; padding: 0 10px; cursor: pointer; opacity: 0.7; }
        .btn-del-item:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="text-center mb-3">
        <h4 class="fw-bold m-0" style="color: var(--accent);">MEU SALÁRIO PRO</h4>
        <small class="text-muted">Impacto no Salário %</small>
    </div>

    <div class="card-mobile text-center">
        <label class="small text-white mb-1 fw-bold text-uppercase">💰 Meu Salário Mensal (R$)</label>
        <input type="text" id="salBase" class="input-mobile w-100 text-center fs-3 fw-bold text-white" placeholder="Ex: 5000" oninput="atualizar()">
    </div>

    <div class="resumo-grid">
        <div id="cardTotal" class="status-box bg-danger bg-opacity-25 text-white">Gasto: R$ 0</div>
        <div id="cardSaldo" class="status-box bg-success bg-opacity-25 text-white">Saldo: R$ 0</div>
    </div>

    <div class="card-mobile">
        <input type="text" id="desc" class="form-control input-mobile mb-2" placeholder="O que você pagou?">
        <div class="row g-2 mb-3">
            <div class="col-6">
                <input type="text" id="valor" class="form-control input-mobile" placeholder="Valor (ex: 500)">
            </div>
            <div class="col-6">
                <select id="cat" class="form-control input-mobile">
                    <option value="🏠">Aluguel</option>
                    <option value="💳">Cartão</option>
                    <option value="🍺">Cerveja</option>
                    <option value="🍻">Saidinha</option>
                    <option value="🛒">Mercado</option>
                    <option value="🌐">Internet</option>
                    <option value="📱">Celular</option>
                    <option value="🚗">Financiamento</option>
                    <option value="📉">Empréstimo</option>
                    <option value="✨">Outros</option>
                </select>
            </div>
        </div>
        <button onclick="add()" class="btn-add shadow">ADICIONAR GASTO</button>
    </div>

    <div class="card-mobile">
        <h6 class="fw-bold m-0 mb-3 text-uppercase small text-white">HISTÓRICO & PORCENTAGEM</h6>
        <table class="table table-custom mb-0 w-100">
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div class="px-2 text-center">
        <button onclick="limparMes()" class="btn-reset">🗑️ ZERAR MÊS ATUAL</button>
    </div>

<script>
    let dados = JSON.parse(localStorage.getItem('mob_sal_vFinal')) || [];
    document.getElementById('salBase').value = localStorage.getItem('mob_base_vFinal') || "";

    function formatarDinheiro(num) {
        return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function add() {
        const d = document.getElementById('desc').value;
        const vRaw = document.getElementById('valor').value.replace('.', '').replace(',', '.');
        const v = parseFloat(vRaw);
        const c = document.getElementById('cat').value;

        if (d && !isNaN(v)) {
            dados.push({ id: Date.now(), d, v, c });
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            atualizar();
        }
    }

    function atualizar() {
        const baseRaw = document.getElementById('salBase').value.replace('.', '').replace(',', '.');
        const base = parseFloat(baseRaw) || 0;
        
        localStorage.setItem('mob_base_vFinal', document.getElementById('salBase').value);
        localStorage.setItem('mob_sal_vFinal', JSON.stringify(dados));

        let total = 0;
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        dados.forEach(item => {
            total += item.v;
            const porcentagem = base > 0 ? ((item.v / base) * 100).toFixed(1) : "0.0";
            
            lista.innerHTML += `
                <tr>
                    <td style="width: 45px; font-size: 1.5rem;">${item.c}</td>
                    <td>
                        <div class="fw-bold text-white">${item.d}</div>
                        <span class="perc-impacto">Custou ${porcentagem}% do salário</span>
                    </td>
                    <td class="text-end">
                        <div class="text-white fw-bold">R$ ${formatarDinheiro(item.v)}</div>
                    </td>
                    <td style="width: 40px;" class="text-center">
                        <button onclick="del(${item.id})" class="btn-del-item">✕</button>
                    </td>
                </tr>`;
        });

        const saldo = base - total;
        document.getElementById('cardTotal').innerText = `Gasto: R$ ${formatarDinheiro(total)}`;
        document.getElementById('cardSaldo').innerText = `Saldo: R$ ${formatarDinheiro(saldo)}`;
    }

    function del(id) { 
        dados = dados.filter(x => x.id !== id); 
        atualizar(); 
    }

    function limparMes() { 
        if(confirm("Zerar tudo?")) { 
            dados = []; 
            atualizar(); 
        } 
    }
    
    atualizar();
</script>

</body>
</html>
